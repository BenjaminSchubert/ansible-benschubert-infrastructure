---
- name: Create container instances
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Start Virtual machine
      ansible.builtin.command:
        cmd: vagrant up
      changed_when: "'Machine already provisioned.' not in _vagrant_up.stdout"
      register: _vagrant_up

    - name: Recover ssh config information
      ansible.builtin.command:
        cmd: vagrant ssh-config
      changed_when: false
      register: _vagrant_ssh

    - name: Set facts
      ansible.builtin.set_fact:
        host: >-
          {{
            _vagrant_ssh.stdout_lines
            | select('match', '^\s+HostName ')
            | first
            | trim
            | split(' ', 1)
            | last
          }}
        identity_file: >-
          {{
            _vagrant_ssh.stdout_lines
            | select('match', '^\s+IdentityFile ')
            | first
            | trim
            | split(' ', 1)
            | last
          }}

    - name: Dump instance config
      ansible.builtin.copy:
        content: |
          # Molecule managed
          ---
          all:
            children:
              molecule:
                hosts:
                  molecule-benschubert-infrastructure:
                    ansible_host: {{ host }}
                    ansible_user: vagrant
                    ansible_ssh_private_key_file: {{ identity_file }}
        dest: "{{ molecule_scenario_directory }}/inventory/autogenerated.yml"
        mode: "0600"

    - name: Dump instance config
      ansible.builtin.copy:
        content: |
          # Molecule managed
          ---
          - instance: molecule-benschubert-infrastructure
            address: {{ host }}
            identity_file: {{ identity_file }}
            port: 22
            user: vagrant
        dest: "{{ molecule_instance_config }}"
        mode: "0600"
