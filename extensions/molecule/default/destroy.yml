---
- name: Destroy container instances
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Gather facts about storage pools
      community.libvirt.virt_pool:
        command: facts
        uri: qemu:///session

    - name: Destroy the Virtual Machine
      community.libvirt.virt_install:
        name: molecule-benschubert-infrastructure-test
        state: absent
        uri: qemu:///session

    - name: Delete instance config
      ansible.builtin.file:
        path: "{{ molecule_scenario_directory }}/inventory/autogenerated.yml"
        state: absent

    - name: Get the location for the data pool
      ansible.builtin.set_fact:
        pool_path: >-
          {{
            lookup(
              'ansible.builtin.env',
              'POOL_PATH',
              default=ansible_facts.libvirt_pools.default.path
            )
          }}

    - name: Destroy the old cloud-init iso
      ansible.builtin.file:
        path: "{{ pool_path }}/molecule-benschubert-infrastructure-test-cloud-init.iso"
        state: absent
