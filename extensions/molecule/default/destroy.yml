---
- name: Destroy container instances
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Destroy Virtual machine
      ansible.builtin.command:
        cmd: vagrant destroy --force
      register: _vagrant_destroy
      changed_when: "'Domain is not created' in _vagrant_destroy.stdout"

    - name: Delete instance config
      ansible.builtin.file:
        path: "{{ molecule_scenario_directory }}/inventory/autogenerated.yml"
        state: absent
