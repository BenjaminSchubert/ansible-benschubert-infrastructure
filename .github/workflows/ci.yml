---
# All the checks run here (except for secret scanning) can be run locally with:
#
#   dwas
#
name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  ANSIBLE: "2.20"
  PYTHON: "3.14"

jobs:
  ###
  # Linting jobs
  ###
  ansible-lint:
    runs-on: ubuntu-latest
    env:
      # Not quite sure why we need to set this, but it gives warnings otherwise
      ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --no-default-groups --group ansible-lint
      - name: Install the collection
        run: uv run --no-sync ansible-galaxy collection install .
      - name: Install test collections
        run: uv run --no-sync ansible-galaxy install --role-file=extensions/molecule/default/requirements.yml
      - name: Run ansible-lint
        uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c  # 26.4.0
        with:
          args: --strict
          setup_python: false
          working_directory: ${{ github.workspace }}/ansible_collections/benschubert/infrastructure/
  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install system dependencies
        run: sudo apt-get install --assume-yes libvirt-dev
      - name: Install python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --only-group mypy
      - name: Run mypy
        run: uv run --no-sync mypy .
  pylint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install system dependencies
        run: sudo apt-get install --assume-yes libvirt-dev
      - name: Install python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --only-group pylint
      - name: Run Pylint
        run: uv run --no-sync pylint .
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
      - name: Check format
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          args: format --diff
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run sanity checks
        uses: ansible-community/ansible-test-gh-action@d3a8ec7a59694e25e210fcd44738910149537f0e  # v1.17.0
        with:
          ansible-core-version: stable-${{ env.ANSIBLE }}
          coverage: never
          origin-python-version: ${{ env.PYTHON }}
          sanity-skip-tests: no-assert,pylint
          target-python-version: ${{ env.PYTHON }}
          testing-type: sanity
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v.3.95.2

  ###
  # Tests
  ###
  molecule:
    name: molecule
    env:
      PY_COLORS: 1
      ANSIBLE_FORCE_COLOR: 1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install libvirt and dependencies
        run: sudo apt-get install --assume-yes cloud-image-utils libvirt-daemon-system libvirt-dev qemu-kvm virtinst
      - name: Add user to the kvm group
        run: sudo adduser "${USER}" kvm
      - name: Add user to the libvirt-qemu group
        run: sudo adduser "${USER}" libvirt-qemu
      - name: Configure bridge for user-space networking
        run: sudo mkdir /etc/qemu && echo "allow virbr0" | sudo tee /etc/qemu/bridge.conf
      - name: Allow qemu-bridge-helper to be used as non-root
        run: sudo chmod u+s /usr/lib/qemu/qemu-bridge-helper
      - name: Install dependencies
        run: uv sync --locked --no-default-groups --group tests
      - name: molecule create
        run: sg kvm 'sg libvirt-qemu "sg \"${USER}\" \"uv run --no-sync molecule create\""'
      - name: molecule converge
        run: mkdir -p ${PWD}/.cache && uv run --no-sync molecule converge
        env:
          ANSIBLE_LOG_PATH: ${PWD}/.cache/ansible-logs-converge
      - name: molecule idempotence
        run: uv run --no-sync molecule idempotence
        env:
          ANSIBLE_LOG_PATH: ${PWD}/.cache/ansible-logs-idempotence-1
      - name: molecule side-effect
        run: uv run --no-sync molecule side-effect
        env:
          ANSIBLE_LOG_PATH: ${PWD}/.cache/ansible-logs-side-effect
      - name: molecule idempotence again
        run: uv run --no-sync molecule idempotence
        env:
          ANSIBLE_LOG_PATH: ${PWD}/.cache/ansible-logs-idempotence-2
      - name: molecule check
        run: uv run --no-sync molecule check
        env:
          ANSIBLE_LOG_PATH: ${PWD}/.cache/ansible-logs-check
      - name: molecule verify
        run: uv run --no-sync molecule verify
      - name: Analyse the output of molecule
        run: >-
          echo "## Converge" >> $GITHUB_STEP_SUMMARY &&
          uv run --no-sync python .github/scripts/analyse-ansible-output.py .cache/ansible-logs-converge
          | tee --append $GITHUB_STEP_SUMMARY
          && echo "## Idempotence 1" >> $GITHUB_STEP_SUMMARY &&
          uv run --no-sync python .github/scripts/analyse-ansible-output.py .cache/ansible-logs-idempotence-1
          | tee --append $GITHUB_STEP_SUMMARY
          && echo "## side-effect" >> $GITHUB_STEP_SUMMARY &&
          uv run --no-sync python .github/scripts/analyse-ansible-output.py .cache/ansible-logs-side-effect-1
          | tee --append $GITHUB_STEP_SUMMARY
          && echo "## Idempotence 2" >> $GITHUB_STEP_SUMMARY &&
          uv run --no-sync python .github/scripts/analyse-ansible-output.py .cache/ansible-logs-idempotence-2
          | tee --append $GITHUB_STEP_SUMMARY
          && echo "## Check" >> $GITHUB_STEP_SUMMARY &&
          uv run --no-sync python .github/scripts/analyse-ansible-output.py .cache/ansible-logs-check
          | tee --append $GITHUB_STEP_SUMMARY
      - name: molecule destroy
        run: uv run --no-sync molecule destroy

  ###
  # Package
  ###
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --no-install-project --no-default-groups
      - name: Build collection
        run: uv run --no-sync ansible-galaxy collection build --output-path _artifacts/
      - name: Save packaged collection
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: package
          path: _artifacts/*
          retention-days: 7

  ###
  # Docs
  ###
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible_collections/benschubert/infrastructure/
    env:
      ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: ansible_collections/benschubert/infrastructure/
      - name: Install python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --only-group docs
      - name: Validate the collection's documentation
        run: >-
          uv run --no-sync antsibull-docs
          --config-file=docs/antsibull-docs.cfg
          lint-collection-docs
          --plugin-docs
          --validate-collection-refs=all
          .
      - name: Generate the collection's documentation
        run: >-
          uv run --no-sync antsibull-docs
          --config-file=docs/antsibull-docs.cfg
          collection
          --use-current
          --fail-on-error
          --dest-dir=docs
          --squash-hierarchy
          benschubert.infrastructure
      - name: Build documentation
        run: uv run --no-sync sphinx-build -W --color -b=html docs/ _artifacts/docs
      - name: Validate links
        run: uv run --no-sync sphinx-build -W --color -b=linkcheck docs/ /tmp/linkcheck
      - name: Validate spelling
        run: uv run --no-sync sphinx-build -W --color -b=spelling docs/ /tmp/spelling
      - name: Save the documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: docs
          path: ansible_collections/benschubert/infrastructure//_artifacts/*
          retention-days: 7
